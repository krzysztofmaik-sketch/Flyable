<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#14181D">
<title>Flyable? — Dunstable</title>
<style>
  :root{
    --night:#14181D;       /* charcoal evening-briefing background */
    --panel:#1C2229;
    --panel-2:#232A33;
    --chalk:#EDE9DF;       /* the Downs are chalk */
    --chalk-dim:#9BA0A6;
    --magenta:#E0457B;     /* CAA half-mil chart airspace magenta */
    --go:#5BBE6E;
    --amber:#E8A33D;
    --stop:#D9534F;
    --ridge:#5B9BD5;
    --thermal:#E8A33D;
    --mono:ui-monospace,'Cascadia Mono','Roboto Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}
  body{
    background:var(--night);color:var(--chalk);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    min-height:100vh;padding-bottom:48px;
  }
  .wrap{max-width:460px;margin:0 auto;padding:0 16px}

  header{
    padding:20px 0 12px;display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid #2A313A;
  }
  header h1{font-size:1.05rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  header h1 span{color:var(--magenta)}
  header .site{font-family:var(--mono);font-size:.7rem;color:var(--chalk-dim)}

  /* day chips */
  .days{display:flex;gap:8px;overflow-x:auto;padding:14px 0 4px;scrollbar-width:none}
  .days::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;border:1px solid #2F3741;background:var(--panel);color:var(--chalk-dim);
    border-radius:999px;padding:7px 14px;font-size:.8rem;font-weight:600;cursor:pointer;
  }
  .chip.sel{border-color:var(--magenta);color:var(--chalk);background:#2A2027}

  /* verdict */
  .verdict{
    margin-top:14px;background:var(--panel);border:1px solid #2A313A;border-radius:14px;
    padding:18px 18px 16px;position:relative;overflow:hidden;
  }
  .verdict::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--vcol,#555)}
  .verdict .word{font-size:2rem;font-weight:800;letter-spacing:.02em;color:var(--vcol,#888)}
  .verdict .why{margin-top:6px;font-size:.88rem;line-height:1.45;color:var(--chalk-dim)}
  .verdict .window{margin-top:10px;font-family:var(--mono);font-size:.78rem;color:var(--chalk)}

  /* dial + stats row */
  .row{display:flex;gap:12px;margin-top:12px}
  .card{background:var(--panel);border:1px solid #2A313A;border-radius:14px;padding:14px}
  .dialcard{flex:0 0 178px;display:flex;flex-direction:column;align-items:center}
  .dialcard .lbl{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--chalk-dim);margin-bottom:6px}
  .stats{flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:8px}
  .stat{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px dashed #2A313A;padding-bottom:6px}
  .stat:last-child{border-bottom:none;padding-bottom:0}
  .stat .k{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--chalk-dim)}
  .stat .v{font-family:var(--mono);font-size:.92rem;font-weight:600}

  /* hourly strip */
  .hours{margin-top:12px}
  .hours h2{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--chalk-dim);margin:14px 0 8px}
  .strip{display:flex;gap:4px;align-items:flex-end;height:120px}
  .hr{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
  .bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;background:#2F3741}
  .bar.ridge{background:var(--ridge)}
  .bar.thermal{background:var(--thermal)}
  .bar.both{background:linear-gradient(180deg,var(--thermal),var(--ridge))}
  .bar.rain{background:repeating-linear-gradient(45deg,#3A4450 0 4px,#2A313A 4px 8px)}
  .hr .t{font-family:var(--mono);font-size:.58rem;color:var(--chalk-dim)}
  .legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
  .legend span{font-size:.68rem;color:var(--chalk-dim);display:flex;align-items:center;gap:5px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}

  /* settings */
  details{margin-top:18px;border:1px solid #2A313A;border-radius:14px;background:var(--panel)}
  summary{padding:13px 16px;font-size:.8rem;font-weight:600;color:var(--chalk-dim);cursor:pointer;list-style:none}
  summary::before{content:'▸ ';color:var(--magenta)}
  details[open] summary::before{content:'▾ '}
  .set{padding:4px 16px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .set label{font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;color:var(--chalk-dim);display:block;margin-bottom:3px}
  .set input{
    width:100%;background:var(--night);border:1px solid #2F3741;border-radius:8px;color:var(--chalk);
    font-family:var(--mono);font-size:.85rem;padding:8px 10px;
  }
  .set input:focus{outline:2px solid var(--magenta);outline-offset:1px}
  .set .full{grid-column:1/-1}
  .set button{
    grid-column:1/-1;background:var(--magenta);border:none;border-radius:10px;color:#fff;
    font-weight:700;font-size:.85rem;padding:11px;cursor:pointer;margin-top:4px;
  }

  .status{margin-top:14px;font-family:var(--mono);font-size:.7rem;color:var(--chalk-dim);text-align:center}
  .status.err{color:var(--stop)}
  .foot{margin-top:8px;text-align:center;font-size:.62rem;color:#5A6068}

  @media (prefers-reduced-motion:no-preference){
    .verdict,.row .card,.hours{animation:up .35s ease both}
    @keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Flyable<span>?</span></h1>
    <div class="site">EGSU&nbsp;area · LGC Dunstable</div>
  </header>

  <div class="days" id="days"></div>

  <div class="verdict" id="verdict" style="--vcol:#555">
    <div class="word" id="vword">—</div>
    <div class="why" id="vwhy">Fetching forecast…</div>
    <div class="window" id="vwindow"></div>
  </div>

  <div class="row">
    <div class="card dialcard">
      <div class="lbl">Wind vs ridge · midday</div>
      <svg id="dial" width="150" height="150" viewBox="0 0 150 150" aria-label="wind direction dial"></svg>
    </div>
    <div class="card stats" id="stats"></div>
  </div>

  <div class="hours">
    <h2>Soarable hours 09:00–18:00</h2>
    <div class="card">
      <div class="strip" id="strip"></div>
      <div class="legend">
        <span><i class="dot" style="background:var(--ridge)"></i>Ridge</span>
        <span><i class="dot" style="background:var(--thermal)"></i>Thermal</span>
        <span><i class="dot" style="background:repeating-linear-gradient(45deg,#3A4450 0 4px,#2A313A 4px 8px)"></i>Rain</span>
        <span><i class="dot" style="background:#2F3741"></i>Not soarable</span>
      </div>
    </div>
  </div>

  <details>
    <summary>Tuning (your ridge knowledge goes here)</summary>
    <div class="set" id="setform"></div>
  </details>

  <div class="status" id="status"></div>
  <div class="foot">Forecast: Open-Meteo (UKMO/ICON/ECMWF blend) · Bar height = wind speed · Not a substitute for a proper briefing</div>
</div>

<script>
'use strict';
/* ---------------- config ---------------- */
const LAT = 51.866, LON = -0.546;            // London Gliding Club
const DEFAULTS = {
  arcFrom: 240, arcTo: 320,                  // ridge-working wind directions (°)
  ridgeMin: 12, ridgeMax: 28,                // kt at 10 m
  gustFactor: 1.9,                           // max gust/mean ratio
  thermalMaxWind: 12,                        // kt
  minCape: 100,                              // J/kg
  minBLH: 900,                               // m, boundary layer (≈ thermal top)
  minBase: 2200,                             // ft AGL estimated cloud base
  maxRainProb: 55, maxLowCloud: 85
};
let cfg = loadCfg();
function loadCfg(){
  try{ return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem('lgc-cfg')||'{}')); }
  catch(e){ return Object.assign({}, DEFAULTS); }
}
function saveCfg(c){ try{ localStorage.setItem('lgc-cfg', JSON.stringify(c)); }catch(e){} }

/* ---------------- fetch ---------------- */
let DATA = null, selDate = null;
const $ = id => document.getElementById(id);

async function fetchWx(){
  $('status').textContent = 'Updating…'; $('status').className = 'status';
  const h = ['temperature_2m','dew_point_2m','precipitation','precipitation_probability',
             'cloud_cover_low','cloud_cover','wind_speed_10m','wind_direction_10m',
             'wind_gusts_10m','cape','boundary_layer_height'].join(',');
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`+
              `&hourly=${h}&wind_speed_unit=kn&timezone=Europe%2FLondon&forecast_days=7`;
  try{
    const r = await fetch(url);
    if(!r.ok) throw new Error('HTTP '+r.status);
    DATA = (await r.json()).hourly;
    buildDays();
    render();
    $('status').textContent = 'Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    $('status').textContent = 'Could not reach the forecast service. Check connection, then reopen.';
    $('status').className = 'status err';
  }
}

/* ---------------- analysis ---------------- */
function inArc(dir, from, to){
  if(from <= to) return dir >= from && dir <= to;
  return dir >= from || dir <= to;          // wraps through north
}
function hourScore(i){
  const spd  = DATA.wind_speed_10m[i],  dir = DATA.wind_direction_10m[i],
        gust = DATA.wind_gusts_10m[i],  t   = DATA.temperature_2m[i],
        td   = DATA.dew_point_2m[i],    cape= DATA.cape ? DATA.cape[i] : null,
        blh  = DATA.boundary_layer_height ? DATA.boundary_layer_height[i] : null,
        rainP= DATA.precipitation_probability[i] ?? 0,
        rain = DATA.precipitation[i] ?? 0,
        lowC = DATA.cloud_cover_low[i] ?? 0;
  const base = Math.round((t - td) * 400);  // ft AGL, dewpoint-spread estimate
  const wet  = rain > 0.2 || rainP > cfg.maxRainProb;
  const ridge = !wet && inArc(dir, cfg.arcFrom, cfg.arcTo) &&
                spd >= cfg.ridgeMin && spd <= cfg.ridgeMax &&
                (spd === 0 || gust/Math.max(spd,1) <= cfg.gustFactor);
  const lift  = (cape !== null && cape >= cfg.minCape) || (blh !== null && blh >= cfg.minBLH);
  const thermal = !wet && spd <= cfg.thermalMaxWind && lift &&
                  base >= cfg.minBase && lowC <= cfg.maxLowCloud;
  return { spd, dir, gust, base, wet,
           type: ridge && thermal ? 'both' : ridge ? 'ridge' : thermal ? 'thermal' : wet ? 'rain' : 'no' };
}
function dayIndices(dateStr){
  const out = [];
  DATA.time.forEach((t,i)=>{
    if(t.startsWith(dateStr)){
      const hr = +t.slice(11,13);
      if(hr >= 9 && hr <= 18) out.push(i);
    }
  });
  return out;
}

/* ---------------- render ---------------- */
function buildDays(){
  const seen = [...new Set(DATA.time.map(t=>t.slice(0,10)))].slice(0,7);
  const today = seen[0];
  selDate = selDate && seen.includes(selDate) ? selDate : (seen[1] || seen[0]); // default: tomorrow
  $('days').innerHTML = seen.map(d=>{
    const lbl = d===seen[0] ? 'Today' : d===seen[1] ? 'Tomorrow'
              : new Date(d+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric'});
    return `<button class="chip ${d===selDate?'sel':''}" data-d="${d}">${lbl}</button>`;
  }).join('');
  $('days').querySelectorAll('.chip').forEach(b=>b.onclick=()=>{selDate=b.dataset.d;buildDays();render();});
}

function render(){
  const idx = dayIndices(selDate);
  if(!idx.length) return;
  const scores = idx.map(hourScore);

  /* verdict over 10:00–18:00 */
  const flyHrs = scores.filter(s=>s.type!=='no'&&s.type!=='rain').length;
  const v = $('verdict');
  let word, col, why;
  if(flyHrs >= 4){ word='FLYABLE'; col='var(--go)'; }
  else if(flyHrs >= 2){ word='MARGINAL'; col='var(--amber)'; }
  else { word='NOT FLYABLE'; col='var(--stop)'; }
  v.style.setProperty('--vcol', col);
  $('vword').textContent = word;

  const mid = scores[Math.min(4, scores.length-1)];          // ~13:00
  const types = new Set(scores.map(s=>s.type));
  if(types.has('ridge')||types.has('both')) why = 'Wind on the ridge — '+Math.round(mid.spd)+' kt from '+compass(mid.dir)+'.';
  else if(types.has('thermal')) why = 'Light-wind thermal day, est. base ~'+fmtBase(bestBase(scores))+' AGL.';
  else if(scores.every(s=>s.wet)) why = 'Rain through the soaring window.';
  else if(mid.spd > cfg.ridgeMax) why = 'Too strong — '+Math.round(mid.spd)+' kt gusting '+Math.round(mid.gust)+'.';
  else if(!inArc(mid.dir,cfg.arcFrom,cfg.arcTo) && mid.spd > cfg.thermalMaxWind)
       why = compass(mid.dir)+' wind is off the ridge and too strong for thermals.';
  else why = 'No usable lift forecast — stable, or base too low.';
  $('vwhy').textContent = why;

  const wins = window_(scores, idx);
  $('vwindow').textContent = wins ? 'Soarable window  '+wins : '';

  /* dial: midday hour */
  drawDial(mid.dir, mid.spd);

  /* stats */
  const blhArr = DATA.boundary_layer_height;
  const blhMax = blhArr ? Math.max(...idx.map(i=>blhArr[i]||0)) : null;
  $('stats').innerHTML =
    stat('Wind 13:00', Math.round(mid.spd)+' kt / '+pad(Math.round(mid.dir))+'°')+
    stat('Gusts', Math.round(Math.max(...scores.map(s=>s.gust)))+' kt max')+
    stat('Est. cloud base', fmtBase(bestBase(scores))+' AGL')+
    stat('Thermal top', blhMax ? Math.round(blhMax*3.28/100)*100+' ft' : 'n/a')+
    stat('Rain risk', Math.max(...idx.map(i=>DATA.precipitation_probability[i]||0))+'%');

  /* hourly strip */
  const maxS = Math.max(...scores.map(s=>s.spd), cfg.ridgeMax);
  $('strip').innerHTML = scores.map((s,k)=>{
    const h = Math.max(6, Math.round(s.spd/maxS*92));
    const cls = s.type==='no' ? '' : s.type;
    const hr = DATA.time[idx[k]].slice(11,13);
    return `<div class="hr"><div class="bar ${cls}" style="height:${h}%" title="${hr}:00 — ${Math.round(s.spd)}kt ${compass(s.dir)}"></div><div class="t">${hr}</div></div>`;
  }).join('');
}

function stat(k,v){ return `<div class="stat"><span class="k">${k}</span><span class="v">${v}</span></div>`; }
function bestBase(sc){ return Math.max(...sc.map(s=>s.base)); }
function fmtBase(b){ return (Math.round(b/100)*100).toLocaleString()+' ft'; }
function pad(n){ return String(n).padStart(3,'0'); }
function compass(d){ const p=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return p[Math.round(d/22.5)%16]; }
function window_(scores, idx){
  let a=-1,b=-1;
  scores.forEach((s,k)=>{ if(s.type!=='no'&&s.type!=='rain'){ if(a<0)a=k; b=k; } });
  if(a<0) return '';
  return DATA.time[idx[a]].slice(11,16)+'–'+(+DATA.time[idx[b]].slice(11,13)+1)+':00';
}

/* ---------------- ridge dial ---------------- */
function drawDial(dir, spd){
  const C=75, R=62, rad = a=>(a-90)*Math.PI/180;
  const px = (a,r)=>[C+r*Math.cos(rad(a)), C+r*Math.sin(rad(a))];
  const arcPath = (f,t,r)=>{
    if(t<f) t+=360;
    const [x1,y1]=px(f,r), [x2,y2]=px(t,r);
    return `M${x1},${y1} A${r},${r} 0 ${t-f>180?1:0} 1 ${x2},${y2}`;
  };
  /* Dunstable escarpment runs ~NNE–SSW, faces WNW: draw ridge line 030–210° */
  const [rx1,ry1]=px(30,46), [rx2,ry2]=px(210,46);
  const [ax,ay]=px(dir,50), [bx,by]=px((dir+180)%360,28);   // wind arrow: from dir, through centre
  let s = `<circle cx="${C}" cy="${C}" r="${R}" fill="none" stroke="#2F3741" stroke-width="1.5"/>`;
  s += `<path d="${arcPath(cfg.arcFrom,cfg.arcTo,R)}" fill="none" stroke="var(--go)" stroke-width="6" stroke-linecap="round" opacity=".85"/>`;
  s += `<line x1="${rx1}" y1="${ry1}" x2="${rx2}" y2="${ry2}" stroke="var(--chalk)" stroke-width="3" stroke-dasharray="6 4" opacity=".55"/>`;
  ['N','E','S','W'].forEach((l,i)=>{ const [x,y]=px(i*90,R-12);
    s += `<text x="${x}" y="${y+3}" fill="#6A7078" font-size="9" text-anchor="middle" font-family="var(--mono)">${l}</text>`; });
  s += `<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="var(--magenta)" stroke-width="3" stroke-linecap="round"/>`;
  const t = rad(dir+180), hl = 9;
  s += `<path d="M${bx},${by} l${-hl*Math.cos(t-0.45)},${-hl*Math.sin(t-0.45)} M${bx},${by} l${-hl*Math.cos(t+0.45)},${-hl*Math.sin(t+0.45)}"
        stroke="var(--magenta)" stroke-width="3" stroke-linecap="round"/>`;
  s += `<text x="${C}" y="${C+4}" fill="var(--chalk)" font-size="13" font-weight="700" text-anchor="middle" font-family="var(--mono)">${Math.round(spd)}kt</text>`;
  $('dial').innerHTML = s;
}

/* ---------------- settings ---------------- */
const FIELDS = [
  ['arcFrom','Ridge arc from °'], ['arcTo','Ridge arc to °'],
  ['ridgeMin','Ridge min kt'],    ['ridgeMax','Ridge max kt'],
  ['gustFactor','Max gust ratio'],['thermalMaxWind','Thermal max wind kt'],
  ['minCape','Min CAPE J/kg'],    ['minBLH','Min BL height m'],
  ['minBase','Min cloud base ft'],['maxRainProb','Max rain prob %']
];
function buildSettings(){
  $('setform').innerHTML = FIELDS.map(([k,l])=>
    `<div><label for="f_${k}">${l}</label><input id="f_${k}" type="number" step="any" value="${cfg[k]}"></div>`
  ).join('') + `<button id="applyBtn">Apply & re-score</button>`;
  $('applyBtn').onclick = ()=>{
    FIELDS.forEach(([k])=>{ const v = parseFloat($('f_'+k).value); if(!isNaN(v)) cfg[k]=v; });
    saveCfg(cfg); render();
  };
}

buildSettings();
fetchWx();
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) fetchWx(); });
</script>
</body>
</html>
